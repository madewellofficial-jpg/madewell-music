<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>MAMA Tee — Slide 04</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: #080808;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px 90px;
    position: relative;
  }
  .slide-num { position: absolute; top: 52px; right: 80px; font-size: 14px; color: #3a3a3a; letter-spacing: 4px; }
  .tag { font-size: 13px; color: #444; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 28px; }
  .title { font-size: 110px; font-weight: 700; line-height: 0.9; letter-spacing: -4px; color: #fff; }
  .title-sub { font-size: 28px; font-weight: 300; color: #555; margin-top: 20px; letter-spacing: 2px; }
  .divider { width: 56px; height: 1px; background: #2a2a2a; margin: 48px 0; }
  .url-block { margin-bottom: 36px; }
  .url-label { font-size: 13px; color: #333; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
  .url-main { font-size: 28px; color: #888; letter-spacing: 1px; }
  .url-path { font-size: 16px; color: #444; margin-top: 4px; }
  .info-grid { display: flex; flex-direction: column; gap: 12px; }
  .info-row { display: flex; align-items: center; gap: 20px; }
  .info-en { font-size: 16px; color: #555; }
  .info-sep { font-size: 16px; color: #2a2a2a; }
  .info-jp { font-size: 16px; color: #444; }
  .bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .wordmark { font-size: 13px; color: #2a2a2a; letter-spacing: 5px; }
  .insta { font-size: 14px; color: #333; letter-spacing: 1px; }
</style>
</head>
<body>
  <div class="slide-num">04 / 04</div>

  <div>
    <div class="tag">MAMA : THE ETERNAL LOVE · 2026</div>
    <div class="title">ORDER<br>NOW.</div>
    <div class="title-sub">ご注文はこちら。</div>
  </div>

  <div>
    <div class="divider"></div>
    <div class="url-block">
      <div class="url-label">OFFICIAL STORE</div>
      <div class="url-main">madewellmusic.co.kr</div>
      <div class="url-path">→ SHOP → MAMA TEE</div>
    </div>
    <div class="info-grid">
      <div class="info-row">
        <span class="info-en">💳 PayPal · Ships in 3 days</span>
        <span class="info-sep">/</span>
        <span class="info-jp">3日以内発送</span>
      </div>
      <div class="info-row">
        <span class="info-en">🌏 Worldwide shipping available</span>
        <span class="info-sep">/</span>
        <span class="info-jp">海外発送 OK</span>
      </div>
      <div class="info-row">
        <span class="info-en">📱 Instagram DM also available</span>
        <span class="info-sep">/</span>
        <span class="info-jp">DMでもご注文可能</span>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="wordmark">MADEWELL OFFICIAL STORE</div>
    <div class="insta">@madewellmusic_official</div>
  </div>
</body>
</html>
