<!DOCTYPE html>
<html lang="en">
<head>

<title>MAMA Tee — Slide 03</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden;

    flex-direction: column;
    justify-content: space-between;

  .slide-num { position: absolute; top: 52px; right: 80px; font-size: 14px; color: #3a3a3a; letter-spacing: 4px; }

    line-height: 1.2;
    color: #fff;
    font-style: italic;
    letter-spacing: -1px;
  }
  .quote-marks { font-size: 120px; color: #1a1a1a; line-height: 0.6; display: block; margin-bottom: -20px; }
  .divider { width: 56px; height: 1px; background: #2a2a2a; margin: 44px 0; }
  .caption { font-size: 18px; color: #555; letter-spacing: 1px; margin-bottom: 8px; }
  .caption-jp { font-size: 18px; color: #444; letter-spacing: 1px; margin-bottom: 8px; }
  .detail-row { display: flex; gap: 40px; margin-top: 16px; }
  .detail { }
  .detail-label { font-size: 12px; color: #333; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
  .detail-val { font-size: 15px; color: #555; }
  .bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .wordmark { font-size: 13px; color: #2a2a2a; letter-spacing: 5px; }
</style>
</head>
<body>
  <div class="slide-num">03 / 04</div>
