<!DOCTYPE html>

<style>

  .jp-sub { font-size: 24px; color: #555; margin-top: 10px; letter-spacing: 2px; }
  .mid { }

  .next-jp { font-size: 20px; color: #444; margin-top: 8px; letter-spacing: 2px; }

  .wordmark { font-size: 13px; color: #2a2a2a; letter-spacing: 5px; text-transform: uppercase; }

<body>
  <div class="slide-num">01 / 04</div>
