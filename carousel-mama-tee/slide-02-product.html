<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>MAMA Tee — Slide 02</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: #080808;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px 90px;
    position: relative;
  }
  .slide-num { position: absolute; top: 52px; right: 80px; font-size: 14px; color: #3a3a3a; letter-spacing: 4px; }
  .tag { font-size: 13px; color: #444; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 28px; }
  .title { font-size: 72px; font-weight: 600; line-height: 1.05; letter-spacing: -2px; }
  .product-grid { display: flex; gap: 24px; margin: 0; }
  .card {
    flex: 1;
    border: 0.5px solid #222;
    padding: 36px 40px;
    border-radius: 8px;
  }
  .card.white-card { border-color: #333; background: #0f0f0f; }
  .swatch-row { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .swatch { width: 18px; height: 18px; border-radius: 50%; }
  .swatch.black { background: #1a1a1a; border: 1px solid #555; }
  .swatch.white { background: #e8e8e8; border: 1px solid #888; }
  .color-name { font-size: 12px; color: #888; letter-spacing: 4px; text-transform: uppercase; }
  .price-krw { font-size: 40px; font-weight: 500; color: #fff; line-height: 1; }
  .price-sub { font-size: 18px; color: #555; margin-top: 8px; }
  .spec-row { border-top: 0.5px solid #1a1a1a; padding-top: 28px; }
  .spec { font-size: 14px; color: #444; letter-spacing: 1px; margin-bottom: 6px; }
  .spec-jp { font-size: 13px; color: #333; margin-top: 4px; }
  .bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .wordmark { font-size: 13px; color: #2a2a2a; letter-spacing: 5px; }
  .new-badge { font-size: 11px; color: #555; border: 0.5px solid #333; padding: 6px 16px; border-radius: 4px; letter-spacing: 3px; }
</style>
</head>
<body>
  <div class="slide-num">02 / 04</div>

  <div>
    <div class="tag">MAMA : THE ETERNAL LOVE · OFFICIAL MERCH</div>
    <div class="title">OFFICIAL<br>TEE.</div>
  </div>

  <div class="product-grid">
    <div class="card">
      <div class="swatch-row">
        <div class="swatch black"></div>
        <span class="color-name">BLACK</span>
      </div>
      <div class="price-krw">₩29,000</div>
      <div class="price-sub">¥2,900 · $18</div>
    </div>
    <div class="card white-card">
      <div class="swatch-row">
        <div class="swatch white"></div>
        <span class="color-name">WHITE</span>
      </div>
      <div class="price-krw">₩18,000</div>
      <div class="price-sub">¥1,900 · $13</div>
    </div>
  </div>

  <div>
    <div class="spec-row">
      <div class="spec">Overfit cut · S — 4XL · Ships worldwide · PayPal</div>
      <div class="spec-jp">オーバーフィット · S〜4XL · 海外発送対応 · PayPal決済</div>
    </div>
  </div>

  <div class="bottom">
    <div class="wordmark">MADEWELL</div>
    <div class="new-badge">NEW</div>
  </div>
</body>
</html>
